<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>信息技术一级 400题闯关游戏</title>
  <style>
:root {
  --bg: #fff6fb;
  --card: #fffefe;
  --text: #3b2b44;
  --muted: #7f6f8a;
  --brand: #ff6fa8;
  --brand-2: #ffb347;
  --danger: #b42318;
  --ok: #067647;
  --border: #f2cde0;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 15% 10%, #fff 0%, #ffe8f5 34%),
    radial-gradient(circle at 90% 10%, #fff7e8 0%, transparent 25%),
    linear-gradient(145deg, #fff0f8, #fffaf2);
  transition: background 0.5s ease;
}
body.theme-mint {
  background:
    radial-gradient(circle at 15% 10%, #fff 0%, #dff8f0 36%),
    linear-gradient(145deg, #e9fff7, #f5fffb);
}
body.theme-sunset {
  background:
    radial-gradient(circle at 15% 10%, #fff 0%, #ffe9da 34%),
    linear-gradient(145deg, #fff2e8, #fff8f0);
}
body.theme-sky {
  background:
    radial-gradient(circle at 15% 10%, #fff 0%, #e5f2ff 35%),
    linear-gradient(145deg, #eef7ff, #f8fbff);
}

.app {
  max-width: 980px;
  margin: 0 auto;
  padding: 20px;
}

.hero h1 { margin: 0 0 8px; font-size: clamp(24px, 3.6vw, 38px); }
.hero p { margin: 0 0 10px; color: var(--muted); }
.hero-sub { margin-top: -2px; color: #b65088; font-weight: 700; }

.panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  box-shadow: 0 8px 30px rgba(245, 118, 170, 0.12);
}

.panel + .panel { margin-top: 16px; }
.field { margin-bottom: 12px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
label { display: block; font-weight: 700; margin-bottom: 6px; }
select, input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  font-size: 15px;
  background: #fff;
}

.btn {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: #fff;
  padding: 10px 14px;
  font-weight: 700;
  cursor: pointer;
}
.btn:hover { filter: brightness(0.98); }
.btn.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
.btn.danger { background: var(--danger); color: #fff; border-color: var(--danger); }

.tip { color: var(--muted); min-height: 22px; margin: 8px 0 0; }
.quiz-meta {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
  font-weight: 700;
}
.progress-bar {
  width: 100%;
  height: 10px;
  background: #ffe5f1;
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 8px;
}
.progress-fill {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, #ff8cc0, #ffa9b4, #ffc37e);
  transition: width 0.25s ease;
}
.fun-tip {
  margin: 0 0 12px;
  color: #b04b7f;
  font-weight: 700;
  min-height: 22px;
}
.egg-toast {
  margin: 0 0 12px;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px dashed #ffb7d7;
  background: #fff5fb;
  color: #9e3c72;
  font-weight: 700;
  animation: popToast 0.35s ease;
}
.egg-toast.success {
  border-color: #9bd5b5;
  background: #effcf4;
  color: #0a7a4e;
}
.egg-toast.encourage {
  border-color: #ffd0a8;
  background: #fff7ef;
  color: #a75a13;
}
.egg-toast.lucky {
  border-color: #b7ccff;
  background: #f2f6ff;
  color: #3158b8;
}
.question-card {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
}
.question-title { font-weight: 700; line-height: 1.6; margin-bottom: 12px; }
.options { display: grid; gap: 10px; }
.option {
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  display: block;
}
.option input { width: auto; margin-right: 8px; }
.option.selected { border-color: var(--brand); background: #fff0f7; }

.actions {
  margin-top: 14px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: space-between;
}

.summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}
.summary .item {
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
}
.summary .item strong { display: block; font-size: 20px; }
.wrong-list { display: grid; gap: 10px; margin-bottom: 14px; }
.wrong-item {
  border: 1px solid #f3c7c2;
  background: #fff5f4;
  border-radius: 10px;
  padding: 12px;
}
.good { color: var(--ok); font-weight: 700; }
.bad { color: var(--danger); font-weight: 700; }
.celebration {
  border: 1px dashed #ffc7df;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 10px;
  background: #fff4fb;
}
.burst {
  font-size: 24px;
  letter-spacing: 4px;
  animation: pop 0.8s ease-in-out infinite alternate;
}

@keyframes pop {
  from { transform: translateY(0) scale(1); }
  to { transform: translateY(-2px) scale(1.05); }
}
@keyframes popToast {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
  .summary { grid-template-columns: 1fr 1fr; }
  .quiz-meta { grid-template-columns: 1fr 1fr; }
  .field-row { grid-template-columns: 1fr; }
}

</style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>信息技术一级 400题闯关游戏</h1>
      <p>支持随机练习、闯关模式、分类练习，交卷后自动评分并给出错题解析。</p>
      <p class="hero-sub">今天也和小可爱题库一起拿高分吧。</p>
    </header>

    <section id="setup-panel" class="panel">
      <h2>开始练习</h2>

      <div class="field">
        <label for="mode">练习模式</label>
        <select id="mode">
          <option value="random">随机做题</option>
          <option value="level">闯关模式</option>
          <option value="category">题型分类练习</option>
          <option value="wrong">只练习错题</option>
        </select>
      </div>

      <div class="field" id="category-field" hidden>
        <label for="category">选择分类</label>
        <select id="category"></select>
      </div>

      <div class="field" id="count-field">
        <label for="count">题目数量</label>
        <input id="count" type="number" min="1" max="400" value="20" />
      </div>

      <div id="level-fields" class="field-row" hidden>
        <div class="field">
          <label for="level-count">每关题量</label>
          <input id="level-count" type="number" min="1" max="50" value="10" />
        </div>
        <div class="field">
          <label for="level-total">闯关关数</label>
          <input id="level-total" type="number" min="1" max="40" value="5" />
        </div>
      </div>

      <button id="start-btn" class="btn primary">开始</button>
      <button id="open-wrongbook-btn" class="btn">查看错题本</button>
      <p id="setup-tip" class="tip"></p>
    </section>

    <section id="quiz-panel" class="panel" hidden>
      <div class="quiz-meta">
        <div id="mode-title"></div>
        <div id="progress"></div>
        <div id="score-preview"></div>
        <div id="timer"></div>
      </div>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <p id="fun-tip" class="fun-tip"></p>
      <div id="egg-toast" class="egg-toast" hidden></div>

      <article id="question-card" class="question-card"></article>

      <div class="actions">
        <button id="back-btn" class="btn">返回设置</button>
        <button id="prev-btn" class="btn">上一题</button>
        <button id="next-btn" class="btn">下一题</button>
        <button id="submit-btn" class="btn danger">交卷</button>
      </div>
    </section>

    <section id="result-panel" class="panel" hidden>
      <h2>成绩反馈</h2>
      <p id="result-title"></p>
      <div id="celebration" class="celebration" hidden></div>
      <div id="summary" class="summary"></div>
      <h3>错题解析</h3>
      <div id="wrong-list" class="wrong-list"></div>
      <button id="result-wrongbook-btn" class="btn">查看错题本</button>
      <button id="restart-btn" class="btn primary">再来一轮</button>
    </section>

    <section id="wrongbook-panel" class="panel" hidden>
      <h2>错题本学习</h2>
      <p id="wrongbook-tip" class="tip"></p>
      <div id="wrongbook-list" class="wrong-list"></div>
      <div class="actions">
        <button id="close-wrongbook-btn" class="btn">返回设置</button>
        <button id="clear-wrongbook-btn" class="btn danger">清空错题本</button>
      </div>
    </section>
  </main>

  <script>
(() => {
  const bank = window.QUESTION_BANK;
  if (!bank || !Array.isArray(bank.questions)) {
    alert("题库加载失败，请检查 questions-data.js");
    return;
  }

  const WRONG_BOOK_KEY = "it_level1_wrongbook_v1";

  const dom = {
    setupPanel: document.getElementById("setup-panel"),
    quizPanel: document.getElementById("quiz-panel"),
    resultPanel: document.getElementById("result-panel"),
    wrongbookPanel: document.getElementById("wrongbook-panel"),

    mode: document.getElementById("mode"),
    category: document.getElementById("category"),
    count: document.getElementById("count"),
    levelCount: document.getElementById("level-count"),
    levelTotal: document.getElementById("level-total"),
    categoryField: document.getElementById("category-field"),
    countField: document.getElementById("count-field"),
    levelFields: document.getElementById("level-fields"),
    setupTip: document.getElementById("setup-tip"),

    startBtn: document.getElementById("start-btn"),
    prevBtn: document.getElementById("prev-btn"),
    nextBtn: document.getElementById("next-btn"),
    submitBtn: document.getElementById("submit-btn"),
    restartBtn: document.getElementById("restart-btn"),
    backBtn: document.getElementById("back-btn"),

    openWrongbookBtn: document.getElementById("open-wrongbook-btn"),
    resultWrongbookBtn: document.getElementById("result-wrongbook-btn"),
    closeWrongbookBtn: document.getElementById("close-wrongbook-btn"),
    clearWrongbookBtn: document.getElementById("clear-wrongbook-btn"),

    modeTitle: document.getElementById("mode-title"),
    progress: document.getElementById("progress"),
    scorePreview: document.getElementById("score-preview"),
    timer: document.getElementById("timer"),
    questionCard: document.getElementById("question-card"),
    progressFill: document.getElementById("progress-fill"),
    funTip: document.getElementById("fun-tip"),
    eggToast: document.getElementById("egg-toast"),

    summary: document.getElementById("summary"),
    wrongList: document.getElementById("wrong-list"),
    resultTitle: document.getElementById("result-title"),
    celebration: document.getElementById("celebration"),

    wrongbookTip: document.getElementById("wrongbook-tip"),
    wrongbookList: document.getElementById("wrongbook-list"),
  };

  const state = {
    mode: "random",
    pool: [],
    current: 0,
    answers: {},
    streak: 0,
    wrongStreak: 0,
    judged: {},
    startedAt: 0,
    timerId: null,
    themeTimerId: null,
    wrongBook: {},
    level: {
      index: 1,
      total: 1,
      perCount: 10,
      allPassed: true,
      results: []
    }
  };

  function loadWrongBook() {
    try {
      const parsed = JSON.parse(localStorage.getItem(WRONG_BOOK_KEY) || "{}");
      state.wrongBook = parsed && typeof parsed === "object" ? parsed : {};
    } catch {
      state.wrongBook = {};
    }
  }

  function saveWrongBook() {
    localStorage.setItem(WRONG_BOOK_KEY, JSON.stringify(state.wrongBook));
  }

  function wrongQuestionList() {
    const ids = new Set(Object.keys(state.wrongBook).map((k) => Number(k)));
    return bank.questions.filter((q) => ids.has(q.id));
  }

  function updateSetupTip() {
    const wrongCount = wrongQuestionList().length;
    dom.setupTip.textContent = `题库已加载：${bank.total} 题，${bank.categories.length} 个分类，错题本 ${wrongCount} 题。`;
  }

  function shuffle(arr) {
    const copy = [...arr];
    for (let i = copy.length - 1; i > 0; i -= 1) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function setModeUI() {
    const m = dom.mode.value;
    dom.categoryField.hidden = m !== "category";
    dom.countField.hidden = m === "level";
    dom.levelFields.hidden = m !== "level";
  }

  function fillCategories() {
    dom.category.innerHTML = bank.categories.map((c) => `<option value="${c}">${c}</option>`).join("");
  }

  function formatDuration(ms) {
    const totalSec = Math.floor(ms / 1000);
    const min = Math.floor(totalSec / 60);
    const sec = totalSec % 60;
    return `${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
  }

  function updateTimer() {
    const now = Date.now();
    dom.timer.textContent = `用时：${formatDuration(now - state.startedAt)}`;
  }

  function modeName(mode) {
    if (mode === "random") return "随机做题";
    if (mode === "category") return "题型分类练习";
    if (mode === "wrong") return "只练习错题";
    return "闯关模式";
  }

  function startSession(list, title) {
    state.pool = list;
    state.current = 0;
    state.answers = {};
    state.streak = 0;
    state.wrongStreak = 0;
    state.judged = {};
    state.startedAt = Date.now();

    if (state.timerId) clearInterval(state.timerId);
    state.timerId = setInterval(updateTimer, 1000);
    updateTimer();

    dom.modeTitle.textContent = title;
    dom.setupPanel.hidden = true;
    dom.resultPanel.hidden = true;
    dom.wrongbookPanel.hidden = true;
    dom.quizPanel.hidden = false;
    dom.funTip.textContent = "开始答题啦，先拿下第一题。";
    hideEggToast();
    clearTheme();
    renderQuestion();
  }

  function randomChance(probability) {
    return Math.random() < probability;
  }

  function pickRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function showEggToast(message, type = "normal") {
    dom.eggToast.textContent = message;
    dom.eggToast.className = `egg-toast ${type}`;
    dom.eggToast.hidden = false;
    window.clearTimeout(showEggToast.timerId);
    showEggToast.timerId = window.setTimeout(() => {
      dom.eggToast.hidden = true;
    }, 2600);
  }

  function hideEggToast() {
    dom.eggToast.hidden = true;
  }

  function clearTheme() {
    document.body.classList.remove("theme-mint", "theme-sunset", "theme-sky");
    if (state.themeTimerId) {
      clearTimeout(state.themeTimerId);
      state.themeTimerId = null;
    }
  }

  function triggerThemeEgg() {
    const theme = pickRandom(["theme-mint", "theme-sunset", "theme-sky"]);
    clearTheme();
    document.body.classList.add(theme);
    state.themeTimerId = setTimeout(() => clearTheme(), 8000);
    showEggToast("彩蛋触发：幸运主题已开启 8 秒", "lucky");
  }

  function maybeTriggerEasterEgg(eventType) {
    const answeredCount = Object.keys(state.answers).length;
    const candidates = [];

    if (eventType === "correct") {
      if (state.streak >= 5 && randomChance(0.35)) {
        candidates.push(() => triggerThemeEgg());
      }
      if (state.streak >= 3 && randomChance(0.3)) {
        candidates.push(() => showEggToast(pickRandom([
          `连对 ${state.streak} 题，学霸状态拉满`,
          "手感在线，继续保持",
          "太稳了，这题气势很足"
        ]), "success"));
      }
      if (answeredCount > 0 && answeredCount % 10 === 0 && randomChance(0.25)) {
        candidates.push(() => showEggToast("里程碑彩蛋：已完成 10 的倍数题目", "lucky"));
      }
    }

    if (eventType === "wrong") {
      if (state.wrongStreak >= 2 && randomChance(0.45)) {
        candidates.push(() => showEggToast(pickRandom([
          "别急，你已经在进步了",
          "错题就是提分入口，继续冲",
          "稳住节奏，下一题拿下"
        ]), "encourage"));
      }
      if (state.wrongStreak >= 4 && randomChance(0.35)) {
        candidates.push(() => showEggToast("建议彩蛋：先标记难题，最后再回看", "encourage"));
      }
    }

    if (randomChance(0.06)) {
      candidates.push(() => showEggToast("神秘彩蛋：你今天的努力值 +1", "lucky"));
    }

    if (candidates.length > 0) {
      pickRandom(candidates)();
    }
  }

  function feedbackText(selected, correct, qid) {
    const oldState = state.judged[qid];
    const isCorrect = selected === correct;

    if (oldState === isCorrect) {
      return isCorrect ? `答案已是正确，连对 x${state.streak}。` : "这题先记住，下一题继续冲。";
    }

    state.judged[qid] = isCorrect;
    if (isCorrect) {
      state.streak += 1;
      state.wrongStreak = 0;
      maybeTriggerEasterEgg("correct");
      return state.streak >= 5 ? `超强连对 x${state.streak}，状态超好。` : `回答正确，连对 x${state.streak}。`;
    }

    state.streak = 0;
    state.wrongStreak += 1;
    maybeTriggerEasterEgg("wrong");
    return "这题先记住，下一题继续冲。";
  }

  function renderQuestion() {
    const total = state.pool.length;
    const q = state.pool[state.current];
    const picked = state.answers[q.id] || "";

    dom.progress.textContent = `进度：${state.current + 1}/${total}`;
    dom.progressFill.style.width = `${Math.round(((state.current + 1) / total) * 100)}%`;

    const answered = Object.keys(state.answers).length;
    const preview = answered === 0 ? 0 : Math.round((estimateCorrect() / answered) * 100);
    dom.scorePreview.textContent = `当前作答：${answered}题 | 预估正确率：${preview}%`;

    const opts = ["A", "B", "C", "D"].map((k) => {
      const text = q.options[k] ?? "";
      const checked = picked === k ? "checked" : "";
      const cls = picked === k ? "option selected" : "option";
      return `<label class="${cls}" data-key="${k}"><input type="radio" name="opt" value="${k}" ${checked}>${k}. ${text}</label>`;
    }).join("");

    dom.questionCard.innerHTML = `
      <div class="question-title">${q.id}. [${q.category}] ${q.question}</div>
      <div class="options">${opts}</div>
    `;

    dom.prevBtn.disabled = state.current === 0;
    dom.nextBtn.disabled = state.current === total - 1;

    dom.questionCard.querySelectorAll("label.option").forEach((el) => {
      el.addEventListener("click", () => {
        const k = el.getAttribute("data-key");
        if (state.answers[q.id] === k) return;
        state.answers[q.id] = k;
        dom.funTip.textContent = feedbackText(k, q.answer, q.id);
        renderQuestion();
      });
    });
  }

  function estimateCorrect() {
    let c = 0;
    for (const q of state.pool) {
      if (state.answers[q.id] && state.answers[q.id] === q.answer) c += 1;
    }
    return c;
  }

  function scoreSession() {
    const total = state.pool.length;
    const wrong = [];
    let correct = 0;

    for (const q of state.pool) {
      const chosen = state.answers[q.id] || "未作答";
      const key = String(q.id);
      if (chosen === q.answer) {
        correct += 1;
        if (state.mode === "wrong" && state.wrongBook[key]) {
          delete state.wrongBook[key];
        }
      } else {
        wrong.push({ q, chosen });
        const old = state.wrongBook[key] || { wrongCount: 0 };
        state.wrongBook[key] = {
          wrongCount: old.wrongCount + 1,
          lastChosen: chosen,
          lastWrongAt: new Date().toISOString()
        };
      }
    }

    saveWrongBook();
    updateSetupTip();

    const rate = total === 0 ? 0 : (correct / total);
    const score = Math.round(rate * 100);
    return { total, correct, wrong, score, rate };
  }

  function showResult(result, extraTitle = "") {
    if (state.timerId) {
      clearInterval(state.timerId);
      state.timerId = null;
    }

    const duration = formatDuration(Date.now() - state.startedAt);

    dom.quizPanel.hidden = true;
    dom.resultPanel.hidden = false;
    dom.wrongbookPanel.hidden = true;
    dom.celebration.hidden = true;
    dom.celebration.innerHTML = "";

    dom.summary.innerHTML = `
      <div class="item"><span>总题数</span><strong>${result.total}</strong></div>
      <div class="item"><span>答对题数</span><strong>${result.correct}</strong></div>
      <div class="item"><span>得分</span><strong>${result.score}</strong></div>
      <div class="item"><span>用时</span><strong>${duration}</strong></div>
    `;

    const title = extraTitle || "本轮练习完成";
    dom.resultTitle.textContent = `${title}｜${result.score >= 90 ? "学霸模式" : result.score >= 75 ? "稳定发挥" : "继续加油"}`;

    if (result.wrong.length === 0) {
      dom.celebration.hidden = false;
      dom.celebration.innerHTML = `<div class="burst">🎉 ✨ 🌸 🎈 ⭐</div><p class="good">全答对！你太厉害了，继续保持满分状态。</p>`;
      dom.wrongList.innerHTML = `<p class="good">本轮全部答对，继续保持。</p>`;
      return;
    }

    dom.wrongList.innerHTML = result.wrong.map(({ q, chosen }) => {
      const chosenText = chosen === "未作答" ? "未作答" : `${chosen}. ${q.options[chosen]}`;
      return `
        <article class="wrong-item">
          <p><strong>${q.id}. [${q.category}] ${q.question}</strong></p>
          <p class="bad">你的答案：${chosenText}</p>
          <p class="good">正确答案：${q.answer}. ${q.options[q.answer]}</p>
          <p>解析：${q.explanation}</p>
        </article>
      `;
    }).join("");
  }

  function renderWrongBook() {
    const list = wrongQuestionList();
    dom.wrongbookTip.textContent = `当前错题本共 ${list.length} 题。你可以逐题复习，也可以切到“只练习错题”模式。`;

    if (list.length === 0) {
      dom.wrongbookList.innerHTML = `<p class="good">错题本为空，继续保持。</p>`;
      return;
    }

    const sorted = list.sort((a, b) => (state.wrongBook[String(b.id)].wrongCount || 0) - (state.wrongBook[String(a.id)].wrongCount || 0));
    dom.wrongbookList.innerHTML = sorted.map((q) => {
      const meta = state.wrongBook[String(q.id)] || { wrongCount: 0, lastChosen: "-" };
      const last = meta.lastWrongAt ? new Date(meta.lastWrongAt).toLocaleString() : "-";
      return `
        <article class="wrong-item">
          <p><strong>${q.id}. [${q.category}] ${q.question}</strong></p>
          <p>你上次错选：${meta.lastChosen}</p>
          <p>累计错题次数：${meta.wrongCount} | 最近错误时间：${last}</p>
          <p class="good">正确答案：${q.answer}. ${q.options[q.answer]}</p>
          <p>解析：${q.explanation}</p>
          <button class="btn" data-remove-id="${q.id}">已掌握，移出错题本</button>
        </article>
      `;
    }).join("");

    dom.wrongbookList.querySelectorAll("button[data-remove-id]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-remove-id");
        delete state.wrongBook[id];
        saveWrongBook();
        updateSetupTip();
        renderWrongBook();
      });
    });
  }

  function openWrongBookPanel() {
    if (state.timerId) {
      clearInterval(state.timerId);
      state.timerId = null;
    }
    dom.setupPanel.hidden = true;
    dom.quizPanel.hidden = true;
    dom.resultPanel.hidden = true;
    dom.wrongbookPanel.hidden = false;
    clearTheme();
    hideEggToast();
    renderWrongBook();
  }

  function nextLevelOrFinish() {
    const result = scoreSession();
    const pass = result.score >= 60;

    state.level.results.push({
      level: state.level.index,
      ...result,
      pass
    });

    if (!pass) {
      state.level.allPassed = false;
      const details = state.level.results.map((r) => `第${r.level}关 ${r.score}分`).join("；");
      showResult(result, `闯关结束（未通过第${state.level.index}关）。${details}`);
      return;
    }

    if (state.level.index >= state.level.total) {
      const totalQuestions = state.level.results.reduce((n, r) => n + r.total, 0);
      const totalCorrect = state.level.results.reduce((n, r) => n + r.correct, 0);
      const mergedWrong = state.level.results.flatMap((r) => r.wrong);
      showResult({
        total: totalQuestions,
        correct: totalCorrect,
        wrong: mergedWrong,
        score: Math.round((totalCorrect / totalQuestions) * 100),
        rate: totalCorrect / totalQuestions
      }, `恭喜通关 ${state.level.total} 关`);
      return;
    }

    alert(`第 ${state.level.index} 关通过，得分 ${result.score} 分，进入下一关。`);
    state.level.index += 1;
    const shuffled = shuffle(bank.questions).slice(0, state.level.perCount);
    startSession(shuffled, `闯关模式 - 第 ${state.level.index}/${state.level.total} 关`);
  }

  function startBySetup() {
    state.mode = dom.mode.value;

    if (state.mode === "random") {
      const count = Number(dom.count.value);
      if (!Number.isInteger(count) || count < 1 || count > bank.questions.length) {
        dom.setupTip.textContent = `题量应在 1-${bank.questions.length} 之间`;
        return;
      }
      const picked = shuffle(bank.questions).slice(0, count);
      startSession(picked, `${modeName(state.mode)} | 共 ${count} 题`);
      return;
    }

    if (state.mode === "category") {
      const category = dom.category.value;
      const group = bank.questions.filter((q) => q.category === category);
      const count = Number(dom.count.value);
      if (!Number.isInteger(count) || count < 1 || count > group.length) {
        dom.setupTip.textContent = `该分类最多 ${group.length} 题，请重新设置题量`;
        return;
      }
      const picked = shuffle(group).slice(0, count);
      startSession(picked, `${modeName(state.mode)} | ${category} | 共 ${count} 题`);
      return;
    }

    if (state.mode === "wrong") {
      const group = wrongQuestionList();
      if (group.length === 0) {
        dom.setupTip.textContent = "错题本为空，请先完成一轮练习后再用该模式。";
        return;
      }
      const count = Number(dom.count.value);
      if (!Number.isInteger(count) || count < 1 || count > group.length) {
        dom.setupTip.textContent = `当前错题本共 ${group.length} 题，题量应在 1-${group.length} 之间`;
        return;
      }
      const picked = shuffle(group).slice(0, count);
      startSession(picked, `${modeName(state.mode)} | 共 ${count} 题`);
      return;
    }

    const perCount = Number(dom.levelCount.value);
    const levels = Number(dom.levelTotal.value);
    if (!Number.isInteger(perCount) || perCount < 1 || perCount > 50) {
      dom.setupTip.textContent = "每关题量应在 1-50 之间";
      return;
    }
    if (!Number.isInteger(levels) || levels < 1 || levels > 40) {
      dom.setupTip.textContent = "闯关关数应在 1-40 之间";
      return;
    }

    state.level.index = 1;
    state.level.total = levels;
    state.level.perCount = perCount;
    state.level.results = [];
    state.level.allPassed = true;

    const first = shuffle(bank.questions).slice(0, perCount);
    startSession(first, `闯关模式 - 第 1/${levels} 关`);
  }

  dom.mode.addEventListener("change", setModeUI);
  dom.startBtn.addEventListener("click", startBySetup);

  dom.prevBtn.addEventListener("click", () => {
    if (state.current > 0) {
      state.current -= 1;
      renderQuestion();
    }
  });

  dom.nextBtn.addEventListener("click", () => {
    if (state.current < state.pool.length - 1) {
      state.current += 1;
      renderQuestion();
    }
  });

  dom.submitBtn.addEventListener("click", () => {
    if (state.mode === "level") {
      nextLevelOrFinish();
      return;
    }
    showResult(scoreSession());
  });

  dom.backBtn.addEventListener("click", () => {
    const answered = Object.keys(state.answers).length;
    if (answered > 0) {
      const ok = window.confirm("返回设置将结束当前练习，确认返回吗？");
      if (!ok) return;
    }
    if (state.timerId) {
      clearInterval(state.timerId);
      state.timerId = null;
    }
    dom.setupPanel.hidden = false;
    dom.resultPanel.hidden = true;
    dom.quizPanel.hidden = true;
    dom.wrongbookPanel.hidden = true;
    clearTheme();
    hideEggToast();
    updateSetupTip();
  });

  dom.restartBtn.addEventListener("click", () => {
    dom.setupPanel.hidden = false;
    dom.resultPanel.hidden = true;
    dom.quizPanel.hidden = true;
    dom.wrongbookPanel.hidden = true;
    dom.wrongList.innerHTML = "";
    dom.resultTitle.textContent = "";
    dom.celebration.hidden = true;
    dom.celebration.innerHTML = "";
    clearTheme();
    hideEggToast();
    updateSetupTip();
  });

  dom.openWrongbookBtn.addEventListener("click", openWrongBookPanel);
  dom.resultWrongbookBtn.addEventListener("click", openWrongBookPanel);
  dom.closeWrongbookBtn.addEventListener("click", () => {
    dom.setupPanel.hidden = false;
    dom.quizPanel.hidden = true;
    dom.resultPanel.hidden = true;
    dom.wrongbookPanel.hidden = true;
    clearTheme();
    hideEggToast();
    updateSetupTip();
  });

  dom.clearWrongbookBtn.addEventListener("click", () => {
    const ok = window.confirm("确认清空全部错题记录吗？");
    if (!ok) return;
    state.wrongBook = {};
    saveWrongBook();
    updateSetupTip();
    renderWrongBook();
  });

  fillCategories();
  loadWrongBook();
  setModeUI();
  updateSetupTip();
})();

</script>
</body>
</html>
