<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>信息技术一级 400题闯关游戏</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>信息技术一级 400题闯关游戏</h1>
      <p>支持随机练习、闯关模式、分类练习，交卷后自动评分并给出错题解析。</p>
      <p class="hero-sub">今天也和小可爱题库一起拿高分吧。</p>
    </header>

    <section id="setup-panel" class="panel">
      <h2>开始练习</h2>

      <div class="field">
        <label for="mode">练习模式</label>
        <select id="mode">
          <option value="random">随机做题</option>
          <option value="level">闯关模式</option>
          <option value="category">题型分类练习</option>
          <option value="wrong">只练习错题</option>
        </select>
      </div>

      <div class="field" id="category-field" hidden>
        <label for="category">选择分类</label>
        <select id="category"></select>
      </div>

      <div class="field" id="count-field">
        <label for="count">题目数量</label>
        <input id="count" type="number" min="1" max="400" value="20" />
      </div>

      <div id="level-fields" class="field-row" hidden>
        <div class="field">
          <label for="level-count">每关题量</label>
          <input id="level-count" type="number" min="1" max="50" value="10" />
        </div>
        <div class="field">
          <label for="level-total">闯关关数</label>
          <input id="level-total" type="number" min="1" max="40" value="5" />
        </div>
      </div>

      <button id="start-btn" class="btn primary">开始</button>
      <button id="open-wrongbook-btn" class="btn">查看错题本</button>
      <p id="setup-tip" class="tip"></p>
    </section>

    <section id="quiz-panel" class="panel" hidden>
      <div class="quiz-meta">
        <div id="mode-title"></div>
        <div id="progress"></div>
        <div id="score-preview"></div>
        <div id="timer"></div>
      </div>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <p id="fun-tip" class="fun-tip"></p>
      <div id="egg-toast" class="egg-toast" hidden></div>

      <article id="question-card" class="question-card"></article>

      <div class="actions">
        <button id="back-btn" class="btn">返回设置</button>
        <button id="prev-btn" class="btn">上一题</button>
        <button id="next-btn" class="btn">下一题</button>
        <button id="submit-btn" class="btn danger">交卷</button>
      </div>
    </section>

    <section id="result-panel" class="panel" hidden>
      <h2>成绩反馈</h2>
      <p id="result-title"></p>
      <div id="celebration" class="celebration" hidden></div>
      <div id="summary" class="summary"></div>
      <h3>错题解析</h3>
      <div id="wrong-list" class="wrong-list"></div>
      <button id="result-wrongbook-btn" class="btn">查看错题本</button>
      <button id="restart-btn" class="btn primary">再来一轮</button>
    </section>

    <section id="wrongbook-panel" class="panel" hidden>
      <h2>错题本学习</h2>
      <p id="wrongbook-tip" class="tip"></p>
      <div id="wrongbook-list" class="wrong-list"></div>
      <div class="actions">
        <button id="close-wrongbook-btn" class="btn">返回设置</button>
        <button id="clear-wrongbook-btn" class="btn danger">清空错题本</button>
      </div>
    </section>
  </main>

  <script src="questions-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
